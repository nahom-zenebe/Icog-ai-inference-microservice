worker_processes  1;

events {
  worker_connections  1024;
}

http {
  # Required for gRPC over HTTP/2
  upstream grpc_backends {
    server server1:50051;
    server server2:50051;
    server server3:50051;
  }

  server {
    listen 8080 http2;

    # gRPC endpoints
    location / {
      grpc_pass grpc://grpc_backends;

      # Propagate client metadata and allow larger streaming payloads
      grpc_set_header Host $host;
      grpc_set_header X-Real-IP $remote_addr;

      # Reasonable timeouts for streaming
      grpc_read_timeout 3600s;
      grpc_send_timeout 3600s;
    }
  }
}
