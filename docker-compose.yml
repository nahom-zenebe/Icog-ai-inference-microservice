services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ai-nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server1
      - server2
      - server3

  server1:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AUTH_BEARER_TOKEN=12345678
      - SERVER_ID=server1
    expose:
      - "50051"

  server2:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AUTH_BEARER_TOKEN=${AUTH_BEARER_TOKEN:-my-secret-key}
      - SERVER_ID=server2
    expose:
      - "50051"

  server3:
    build:
      context: .
      dockerfile: server/Dockerfile
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - AUTH_BEARER_TOKEN=${AUTH_BEARER_TOKEN:-my-secret-key}
      - SERVER_ID=server3
    expose:
      - "50051"
